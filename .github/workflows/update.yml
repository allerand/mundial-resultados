name: Actualizar resultados del Mundial

on:
  schedule:
    # Cada 5 minutos. Nota: el scheduler de GitHub Actions puede demorar
    # algunos minutos extra en horarios de mucha carga.
    - cron: "*/5 * * * *"
  workflow_dispatch: {}   # permite dispararlo a mano desde la pestaña Actions

permissions:
  contents: write          # necesario para que el bot pueda commitear

concurrency:
  group: actualizar-resultados
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Correr scraper
        env:
          FOOTBALL_DATA_TOKEN: ${{ secrets.FOOTBALL_DATA_TOKEN }}
        run: python3 scraper.py

      - name: Commitear resultados si cambiaron
        run: |
          git config user.name  "resultados-bot"
          git config user.email "actions@github.com"
          git add data/resultados.json data/resultados.csv data/resultados.txt
          if git diff --cached --quiet; then
            echo "Sin cambios en los resultados."
          else
            git commit -m "Actualizar resultados [skip ci] $(date -u +'%Y-%m-%dT%H:%MZ')"
            git push
          fi
